name: Update visitor stats

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:

  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Fetch GoatCounter stats
        env:
          GOATCOUNTER_API_KEY: ${{ secrets.GOATCOUNTER_API_KEY }}
        run: |
          python scripts/fetch_goatcounter.py

      # - name: Commit updated stats
      #   run: |
      #     git config user.name github-actions
      #     git config user.email github-actions@github.com
      #     git add _data/visitor_stats.json
      #     git commit -m "Update visitor stats" || exit 0
      #     git push


      - name: Commit updated stats
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add _data/visitor_stats.json
          git commit -m "Update visitor stats" || exit 0
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
