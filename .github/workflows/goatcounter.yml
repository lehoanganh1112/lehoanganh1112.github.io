name: Update visitor stats

on:
  schedule:
    - cron: '0 0 * * *'   # daily
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch GoatCounter stats
        env:
          API_KEY: ${{ secrets.GOATCOUNTER_API_KEY }}
        run: |
          python scripts/fetch_goatcounter.py

      - name: Commit updated stats
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add _data/visitor_stats.json
          git commit -m "Update visitor stats" || exit 0
          git push